<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0e3a4a" />
<title>Direct2Care Testimonials</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --d2c-ink: #0e3a4a;
    --d2c-ink-soft: #2c5664;
    --d2c-accent: #2a8fd6;
    --bg: #fbf8f4;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--d2c-ink);
    font-family: 'Inter Tight', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { text-align: center; max-width: 420px; }
  img { height: 44px; margin-bottom: 32px; }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    margin: 0 0 12px;
    line-height: 1.2;
  }
  p {
    color: var(--d2c-ink-soft);
    line-height: 1.5;
    font-size: 15px;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="Direct2Care" />
    <h1>Testimonials</h1>
    <p>This page hosts thank-you messages from employees who used Direct2Care at no cost. Each one has its own URL — please scan the band-aid you were given.</p>
  </div>
</body>
</html>
