<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0e3a4a" />
<title>A message from Hennazie — Direct2Care</title>
<meta name="description" content="A thank-you from a Chick-fil-A team member who used Direct2Care at no cost, thanks to their employer." />

<meta property="og:title" content="A message from Hennazie — Direct2Care" />
<meta property="og:description" content="A real thank-you from the people you take care of." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://share.descript.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --d2c-ink:        #0e3a4a;
    --d2c-ink-soft:   #2c5664;
    --d2c-accent:     #2a8fd6;
    --d2c-coral:      #e85a3c;
    --d2c-green:      #2ba37f;
    --d2c-plum:       #8b6aa8;
    --bg:             #fbf8f4;
    --bg-card:        #ffffff;
    --rule:           rgba(14, 58, 74, 0.10);
    --shadow-soft:    0 1px 2px rgba(14, 58, 74, 0.04),
                      0 8px 24px rgba(14, 58, 74, 0.06),
                      0 24px 48px rgba(14, 58, 74, 0.05);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --maxw: 560px;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--d2c-ink);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(42, 143, 214, 0.06), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(232, 90, 60, 0.04), transparent 60%),
      var(--bg);
  }

  .page {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 28px 20px 48px;
    padding-top: max(28px, env(safe-area-inset-top));
    padding-bottom: max(48px, env(safe-area-inset-bottom));
  }

  .brand {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.05s forwards;
  }
  .brand img {
    height: 44px;
    width: auto;
    display: block;
  }

  .headline {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(26px, 7vw, 34px);
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--d2c-ink);
    text-align: center;
    margin: 0 auto 22px;
    max-width: 22ch;
    opacity: 0;
    animation: fadeUp 0.7s ease-out 0.18s forwards;
  }
  .headline .name {
    font-style: normal;
    font-weight: 600;
    color: var(--d2c-ink);
    background: linear-gradient(180deg, transparent 64%, rgba(42, 143, 214, 0.22) 64%, rgba(42, 143, 214, 0.22) 92%, transparent 92%);
    padding: 0 2px;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: #0a1f28;
    box-shadow: var(--shadow-soft);
    opacity: 0;
    animation: fadeUp 0.8s ease-out 0.32s forwards;
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .caption {
    margin: 18px auto 0;
    text-align: center;
    color: var(--d2c-ink-soft);
    font-size: 14.5px;
    line-height: 1.55;
    max-width: 38ch;
    opacity: 0;
    animation: fadeUp 0.7s ease-out 0.48s forwards;
  }
  .caption .first-name {
    color: var(--d2c-ink);
    font-weight: 600;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 36px auto 28px;
    max-width: 200px;
  }
  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .divider span {
    width: 6px;
    height: 6px;
    margin: 0 12px;
    border-radius: 50%;
    background: var(--d2c-accent);
    opacity: 0.7;
  }

  .cta {
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.7s ease-out 0.62s forwards;
  }
  .cta-prompt {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 19px;
    line-height: 1.4;
    color: var(--d2c-ink);
    margin: 0 auto 24px;
    max-width: 32ch;
  }
  .cta-prompt em {
    font-style: italic;
    color: var(--d2c-ink-soft);
  }

  .hubspot-slot {
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 22px 18px;
    box-shadow: 0 1px 2px rgba(14, 58, 74, 0.03), 0 4px 14px rgba(14, 58, 74, 0.05);
  }

  .hubspot-slot .hs-form-field { margin-bottom: 14px; text-align: left; }
  .hubspot-slot label {
    font-size: 13px;
    font-weight: 500;
    color: var(--d2c-ink-soft);
    display: block;
    margin-bottom: 6px;
  }
  .hubspot-slot input[type="text"],
  .hubspot-slot input[type="email"],
  .hubspot-slot input[type="tel"],
  .hubspot-slot textarea,
  .hubspot-slot select {
    width: 100% !important;
    font-family: 'Inter Tight', sans-serif;
    font-size: 16px;
    color: var(--d2c-ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .hubspot-slot input:focus,
  .hubspot-slot textarea:focus,
  .hubspot-slot select:focus {
    outline: none;
    border-color: var(--d2c-accent);
    box-shadow: 0 0 0 3px rgba(42, 143, 214, 0.15);
  }
  .hubspot-slot .hs-button,
  .hubspot-slot input[type="submit"] {
    background: var(--d2c-ink) !important;
    color: #fff !important;
    border: 0 !important;
    border-radius: var(--radius-sm) !important;
    padding: 13px 22px !important;
    font-family: 'Inter Tight', sans-serif !important;
    font-weight: 600 !important;
    font-size: 15px !important;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, transform 0.1s;
  }
  .hubspot-slot .hs-button:hover,
  .hubspot-slot input[type="submit"]:hover {
    background: var(--d2c-accent) !important;
  }
  .hubspot-slot .hs-button:active {
    transform: scale(0.99);
  }
  .hubspot-slot .hs-error-msg,
  .hubspot-slot .hs-error-msgs label {
    color: var(--d2c-coral);
    font-size: 12.5px;
    margin-top: 4px;
  }

  .footer {
    margin-top: 56px;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.7s ease-out 0.78s forwards;
  }
  .footer-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--d2c-accent);
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-style: italic;
    font-size: 17px;
    letter-spacing: 0.005em;
  }
  .footer-mark svg {
    width: 22px;
    height: 22px;
    display: block;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .brand, .headline, .video-wrap, .caption, .cta, .footer {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }

  @media (min-width: 600px) {
    .page { padding: 44px 24px 56px; }
    .brand { margin-bottom: 36px; }
    .brand img { height: 50px; }
    .headline { margin-bottom: 28px; }
    .caption { margin-top: 22px; font-size: 15px; }
  }
</style>
</head>
<body>

<main class="page">

  <div class="brand">
    <img src="../logo.png" alt="Direct2Care" />
  </div>

  <h1 class="headline">
    A message from <span class="name">Hennazie</span>
  </h1>

  <div class="video-wrap">
    <iframe
      src="https://share.descript.com/embed/g09ipYHjXxY"
      title="A message from Hennazie"
      frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen
      loading="eager"
    ></iframe>
  </div>

  <p class="caption">
    <span class="first-name">Hennazie</span> is a Chick-fil-A team member in Nevada who used Direct2Care at no cost to her, thanks to her employer.
  </p>

  <div class="divider"><span></span></div>

  <section class="cta">
    <p class="cta-prompt">
      Want to bring this to your team?<br />
      <em>Find us at the NOIT booth at WorldWide — or learn more below.</em>
    </p>

    <div class="hubspot-slot">
      <div class="hs-form-frame" data-region="na2" data-form-id="420e38ee-0f13-44f6-80ac-78ebe73e5b8c" data-portal-id="2247384"></div>
      <script charset="utf-8" type="text/javascript" src="https://js-na2.hsforms.net/forms/embed/v2.js"></script>
      <script>
        if (window.hbspt) {
          hbspt.forms.create({
            portalId: "2247384",
            formId: "420e38ee-0f13-44f6-80ac-78ebe73e5b8c",
            region: "na2"
          });
        } else {
          window.addEventListener('load', function() {
            if (window.hbspt) {
              hbspt.forms.create({
                portalId: "2247384",
                formId: "420e38ee-0f13-44f6-80ac-78ebe73e5b8c",
                region: "na2"
              });
            }
          });
        }
      </script>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g>
          <path d="M50 8 L72 30 L50 52 L28 30 Z" fill="#2a8fd6" opacity="0.95"/>
          <path d="M50 48 L72 70 L50 92 L28 70 Z" fill="#2a8fd6" opacity="0.55"/>
        </g>
      </svg>
      <span>Pass It On.</span>
    </div>
  </footer>

</main>

</body>
</html>
